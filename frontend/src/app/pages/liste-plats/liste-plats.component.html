<div class="d-flex justify-content-between align-items-center mb-3">
  <h2>📋 Liste des Plats</h2>
  <a routerLink="ajout" class="btn btn-success">➕ Ajouter un plat</a>
</div>

<div *ngIf="message" class="alert alert-info">{{ message }}</div>

<div class="row g-2 mb-3">
  <div class="col-md-5">
    <input [(ngModel)]="recherche" (ngModelChange)="filtrer()"
      class="form-control" placeholder="🔍 Rechercher par nom..." />
  </div>
  <div class="col-md-4">
    <select [(ngModel)]="categorieSelectionnee" (ngModelChange)="filtrer()" class="form-select">
      <option value="">-- Toutes les catégories --</option>
      <option *ngFor="let cat of categories" [value]="(cat)['id'] || cat._id">
        {{ cat.nom }}
      </option>
    </select>
  </div>
  <div class="col-md-3">
    <button (click)="reinitialiser()" class="btn btn-outline-secondary w-100">🔄 Réinitialiser</button>
  </div>
</div>

<div class="table-responsive">
  <table class="table table-bordered table-hover align-middle">
    <thead class="table-dark">
      <tr>
        <th>Image</th><th>Nom</th><th>Description</th><th>Catégorie</th>
        <th>Prix</th><th>Disponible</th><th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngIf="platsFiltres.length === 0">
        <td colspan="7" class="text-center text-muted">Aucun plat trouvé</td>
      </tr>
      <tr *ngFor="let plat of platsFiltres">
        <td>
          <div class="overflow-hidden rounded" style="width: 100px; height: 100px;">
            <img *ngIf="plat.image" [src]="apiUrl + plat.image" alt="Image" class="img-fluid" style="width: 100%; height: 100%; object-fit: cover;" />
          </div>
        </td>
        <td><strong>{{ plat.nom }}</strong></td>
        <td>{{ plat.description }}</td>
        <td><span class="badge bg-secondary">{{ getNomCategorie(plat.categorie) }}</span></td>
        <td>{{ plat.prix | number:'1.2-2' }} TND</td>
        <td>
          <span class="badge" [class.bg-success]="plat.disponible" [class.bg-danger]="!plat.disponible">
            {{ plat.disponible ? '✅ Oui' : '❌ Non' }}
          </span>
        </td>
        <td>
          <a [routerLink]="['edit', getId(plat)]" class="btn btn-sm btn-warning me-1">✏️</a>
          <button (click)="supprimer(plat)" class="btn btn-sm btn-danger">🗑️</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
