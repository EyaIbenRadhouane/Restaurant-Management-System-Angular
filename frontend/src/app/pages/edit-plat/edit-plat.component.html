<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-header bg-warning">
        <h4 class="mb-0">✏️ Modifier le Plat</h4>
      </div>
      <div class="card-body">

        <div *ngIf="erreur" class="alert alert-danger">{{ erreur }}</div>

        <form [formGroup]="form" (ngSubmit)="soumettre()">

          <div class="mb-3">
            <label class="form-label fw-bold">Nom *</label>
            <input formControlName="nom" class="form-control"
              [class.is-invalid]="submitted && f['nom'].invalid" />
            <div class="invalid-feedback">Nom requis</div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">Description *</label>
            <textarea formControlName="description" class="form-control"
              [class.is-invalid]="submitted && f['description'].invalid"
              rows="3"></textarea>
            <div class="invalid-feedback">Description requise</div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">Prix (TND) *</label>
            <input formControlName="prix" type="number"
              step="0.01" class="form-control"
              [class.is-invalid]="submitted && f['prix'].invalid" />
            <div class="invalid-feedback">Prix requis et > 0</div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">Catégorie *</label>
            <select formControlName="categorie" class="form-select"
              [class.is-invalid]="submitted && f['categorie'].invalid">
              <option value="">-- Choisir --</option>
              <option *ngFor="let cat of categories" [value]="cat.id || cat._id">
                {{ cat.nom }}
              </option>
            </select>
            <div class="invalid-feedback">Catégorie requise</div>
          </div>

          <div class="mb-3">
            <label class="form-label fw-bold">Image du plat</label>
            <input type="file" accept="image/*" (change)="onFileSelected($event)" class="form-control" />
            <small class="text-muted">Formats acceptés : tous les formats image (max 5MB)</small>
            <div *ngIf="form.value.image" class="mt-3">
              <div class="border rounded overflow-hidden" style="width: 220px; height: 220px;">
                <img [src]="apiUrl + form.value.image" alt="Image actuelle" style="width: 100%; height: 100%; object-fit: cover;" />
              </div>
            </div>
          </div>

          <div class="mb-3 form-check">
            <input formControlName="disponible" type="checkbox"
              class="form-check-input" id="disponible" />
            <label class="form-check-label" for="disponible">Disponible</label>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-warning flex-fill">
              💾 Mettre à jour
            </button>
            <a routerLink="/plats" class="btn btn-outline-secondary flex-fill">
              ← Annuler
            </a>
          </div>

        </form>
      </div>
    </div>
  </div>
</div>
