<div class="row">
  <div class="col-md-5">

    <div class="card shadow-sm mb-4">
      <div class="card-header bg-info text-white">
        <h5 class="mb-0">🏷️ Nouvelle Catégorie</h5>
      </div>
      <div class="card-body">
        <div class="input-group">
          <input [(ngModel)]="nouvelleCategorie" class="form-control"
            placeholder="Nom de la catégorie" (keyup.enter)="ajouter()" />
          <button (click)="ajouter()" class="btn btn-info">➕ Ajouter</button>
        </div>
      </div>
    </div>

    <div *ngIf="categorieEnEdition" class="card shadow-sm border-warning">
      <div class="card-header bg-warning">
        <h5 class="mb-0">✏️ Modifier la Catégorie</h5>
      </div>
      <div class="card-body">
        <div class="input-group">
          <input [(ngModel)]="nomEdition" class="form-control" (keyup.enter)="sauvegarder()" />
          <button (click)="sauvegarder()" class="btn btn-warning">💾 Sauvegarder</button>
          <button (click)="annulerEdition()" class="btn btn-outline-secondary">✕</button>
        </div>
      </div>
    </div>

  </div>

  <div class="col-md-7">
    <h4>📋 Catégories ({{ categories.length }})</h4>

    <div *ngIf="message" class="alert alert-success">{{ message }}</div>
    <div *ngIf="erreur" class="alert alert-danger">{{ erreur }}</div>

    <div *ngIf="categories.length === 0" class="text-muted">Aucune catégorie enregistrée.</div>

    <ul class="list-group">
      <li *ngFor="let cat of categories; let i = index"
          class="list-group-item d-flex justify-content-between align-items-center">
        <span>
          <span class="badge bg-secondary me-2">{{ i + 1 }}</span>
          {{ cat.nom }}
        </span>
        <div class="d-flex gap-1">
          <button (click)="editer(cat)" class="btn btn-sm btn-warning">✏️</button>
          <button (click)="supprimer(cat)" class="btn btn-sm btn-danger">🗑️</button>
        </div>
      </li>
    </ul>
  </div>
</div>
